<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <style>
    #image {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
    }

    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 200px;
      height: 100vh;
      background-color: grey;
      display: none;
    }

    #toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: none;
    }

    #content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 80%;
    }
  </style>
</head>
<body>
  </div>
  
  <div id="sidebar"></div>
  
  <div id="toggle">&lt;</div>

  <div id="content">
    <p>Hello and welcome to the Games Archive! We are here to uphold the history and legacy of games from Pong to Five Nights at Freddy's! If you have any problems or copyright notices, please see the "Info" tab on the sidebar.</p>
  </div>
  
  <script>
    document.getElementById("image").addEventListener("click", function() {
      this.style.display = "none";
      document.getElementById("sidebar").style.display = "block";
      document.getElementById("toggle").style.display = "block";
    });
    
    document.getElementById("toggle").addEventListener("click", function() {
      document.getElementById("image").style.display = "block";
      document.getElementById("sidebar").style.display = "none";
      document.getElementById("toggle").style.display = "none";
    });
  </script>
</body>
</html>
