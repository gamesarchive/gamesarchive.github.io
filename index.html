<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 403 Access Denied</title>
    <style>
        /* Add your styles here */
    </style>
</head>
<body>
    <script>
        // Function to get user's location based on IP using ipinfo.io API
        function getUserLocation() {
            fetch('https://ipinfo.io/json')
                .then(response => response.json())
                .then(data => {
                    var userLocation = data.country; // Adjust for provinces if needed
                    setErrorMessage(userLocation);
                })
                .catch(error => {
                    console.error('Error fetching IP information:', error);
                    // Default to a generic message if there's an error
                    setErrorMessage();
                });
        }

        // Function to set the appropriate message based on user's location
        function setErrorMessage(location) {
            var errorMessage = "";

            switch (location) {
                case "US":
                    errorMessage = "Error 403, access is blocked due to laws in the United States that bar use of this website";
                    break;
                case "CA":
                    errorMessage = "Error 403, access is blocked due to laws in Canada that bar use of this website";
                    break;
                case "SA":
                    errorMessage = "Error 403, الوصول محظور بسبب القوانين في المملكة العربية السعودية التي تمنع استخدام هذا الموقع";
                    break;

                case "AU":
                case "NZ":
                case "NG":
                case "LR":
                case "JM":
                case "BZ":
                    errorMessage = "Error 403, access is blocked due to laws in " + location + " that bar use of this website";
                    break;
                default:
                    // If the user is not in any of the specified countries, display the generic 403 error message
                    errorMessage = "Error 403 Access Denied";
            }

            document.body.innerHTML = "<p>" + errorMessage + "</p>";
        }

        // Call the function on page load
        window.onload = getUserLocation;
    </script>
